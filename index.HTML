<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>The Bradbury Building</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
    }

    .wrapper {
      background: #e9e9e9;
      max-width: 1279px;
      margin: 0 auto;
      padding: 20px;
    }

    .title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 30px;
      line-height: 1;
      text-align: center;
      margin-bottom: 20px;
    }

    .img-box img {
      width: 100%;
      max-width: 345px;
      display: block;
      margin: 0 auto 20px auto;
    }

    .description {
      font-family: 'Playfair Display', serif;
      font-size: 25px;
      line-height: 1;
      max-width: 345px;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .wrapper {
        padding: 60px 66px;
      }

      .title {
        font-size: 120px;
        text-align: left;
        margin-bottom: 40px;
      }

      .content-row {
        display: flex;
        align-items: center;
        gap: 60px;
      }

      .img-box img {
        max-width: 536px;
        margin: 0;
      }

      .description {
        font-size: 60px;
        max-width: 630px;
        margin: 0;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <h1 class="title">The Bradbury Building</h1>

    <div class="content-row">

      <div class="img-box">
        <img src="img/bb.jpg" alt="Bradbury Building">
      </div>

      <p class="description">
        Step into the Bradbury Building and discover a stunning mix of history, art, and architecture that feels straight out of a movie—just a short trip from Cal State LA.
      </p>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
