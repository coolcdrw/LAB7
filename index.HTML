<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>The Bradbury Building</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
    }

    .wrapper {
      background: #e9e9e9;
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
    }

    /* TITLE */
    .title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 30px; /* mobile */
      line-height: 1;
      text-align: center;
      margin-bottom: 15px;
    }

    /* IMAGE */
    .main-img {
      width: 100%;
      height: auto;
      margin-bottom: 15px;
    }

    /* TEXT */
    .description {
      font-family: 'Playfair Display', serif;
      font-size: 25px; /* mobile */
      line-height: 1;
    }

    /* DESKTOP */
    @media (min-width: 768px) {

      .wrapper {
        padding: 40px;
      }

      .title {
        text-align: left;
        font-size: 120px;
        margin-bottom: 30px;
      }

      .description {
        font-size: 60px;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <!-- TITLE -->
    <h1 class="title">The Bradbury Building</h1>

    <!-- CONTENT -->
    <div class="row align-items-center">

      <!-- IMAGE -->
      <div class="col-12 col-md-6 mb-3 mb-md-0">
        <img src="img/bb.jpg" alt="Bradbury Building" class="main-img">
      </div>

      <!-- TEXT -->
      <div class="col-12 col-md-6">
        <p class="description">
          Step into the Bradbury Building and discover a stunning mix of history, art, and architecture that feels straight out of a movie—just a short trip from Cal State LA.
        </p>
      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
